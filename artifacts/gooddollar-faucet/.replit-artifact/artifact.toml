kind = "web"
previewPath = "/"
title = "GoodDollar Faucet"
version = "1.0.0"
id = "artifacts/gooddollar-faucet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19382

[services.development]
run = "pnpm --filter @workspace/gooddollar-faucet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gooddollar-faucet", "run", "build" ]
publicDir = "artifacts/gooddollar-faucet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19382"
BASE_PATH = "/"
